services:
  app:
    build:
      context: .
      target: test
    ports:
      - "8080:8080"
    environment:
      - Redis__ConnectionString=redis:6379
    depends_on:
      - mock-football-api
      - redis

  mock-football-api:
    build:
      context: .
      target: mock-runtime
    ports:
      - "5081:8080"

  redis:
    image: redis:7-alpine
