services:
  mock-fotmob:
    image: node:22-alpine
    working_dir: /mock-fotmob
    command: node server.js
    ports:
      - "8081:80"
    volumes:
      - ./specs/mock-fotmob:/mock-fotmob

  app:
    build:
      context: .
      target: app
    ports:
      - "8080:8080"
    environment:
      - Redis__ConnectionString=redis:6379
      - FotMob__BaseUrl=${FOTMOB_BASE_URL:-https://www.fotmob.com}
      - FotMob__UseFixtureData=${USE_SCRAPER_FIXTURE_DATA:-false}
      - LiveMatches__RefreshMode=${LIVE_MATCH_REFRESH_MODE:-pulsing}
      - LiveMatches__RefreshIntervalSeconds=${LIVE_MATCH_REFRESH_INTERVAL_SECONDS:-15}
      - SeedTestUsers=${SEED_TEST_USERS:-false}
    depends_on:
      - redis
      - mock-fotmob

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
