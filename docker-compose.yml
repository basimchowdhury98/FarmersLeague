services:
  app:
    build:
      context: .
      target: app
    ports:
      - "8080:8080"
    environment:
      - Redis__ConnectionString=redis:6379
      - WorldCupScraper__BaseUrl=http://scraper:8080
      - WorldCupScraper__IncludeLineupsInMatchList=${INCLUDE_LINEUPS_IN_MATCH_LIST:-false}
    depends_on:
      - redis
      - scraper

  scraper:
    build:
      context: .
      target: scraper-runtime
    ports:
      - "5082:8080"
    environment:
      - FotMob__UseFixtureData=${USE_SCRAPER_FIXTURE_DATA:-false}

  redis:
    image: redis:7-alpine
