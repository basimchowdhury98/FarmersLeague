services:
  app:
    build:
      context: .
      target: app
    ports:
      - "8080:8080"
    environment:
      - Redis__ConnectionString=redis:6379
      - WorldCupScraper__BaseUrl=http://scraper:8080
    depends_on:
      - redis
      - scraper

  scraper:
    build:
      context: .
      target: scraper-runtime
    ports:
      - "5082:8080"

  redis:
    image: redis:7-alpine
